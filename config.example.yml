discord:
  name: "SYSbuga"                 # display name in embeds/images
  token: ""
  client_secret: ""               # OAuth2 client secret
  client_id: ""                   # OAuth2/application id; blank = derived from the bot token
  owner_ids: []
  support_invite: ""
  support_id: 0                   # support server guild id
  alias_manager_role_ids: []      # roles that can manage aliases
  # legal links; blank = omitted from /api/config entirely
  tos_url: ""
  privacy_url: ""

sbuga:
  api_url: "https://api.sbuga.com"
  sonolus_url: "https://sonolus.sbuga.com"
  asset_base_url: ""              # R2 public base url; empty = use the API passthrough
  bot_token: ""                   # bot account token (Authorization: Bot <token>); needs manage_aliases
  image_type: "webp"              # webp | png
  regions: ["en", "jp", "kr", "tw"]  # merge priority order
  refresh_interval: 300           # seconds between data-version polls

api:                              # standalone activity server (webserver/activity_app.py)
  enabled: false
  host: "0.0.0.0"
  port: 8039
  url: ""                         # public base url; doubles as the OAuth redirect (register it in the dev portal)
  workers: 2                      # uvicorn worker processes; each holds its own PJSK data copy

redis:                            # shared state for the multi-worker activity server
  host: "127.0.0.1"
  port: 6379
  db: 0
  password: ""                    # blank = no auth

psql:
  host: "127.0.0.1"
  user: "sbuga"
  database: "sbuga_bot"
  port: 5432
  password: ""
  pool_min_size: 3
  pool_max_size: 10

migrate:
  old_dsn: ""                     # old Sbotga DB (scripts/migrate_from_sbotga.py)
