<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>SYSbuga</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="rain"></canvas>

  <!-- reusable svg symbols -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <g id="i-back"><path d="M15 18l-6-6 6-6" /></g>
      <g id="i-close"><path d="M18 6L6 18M6 6l12 12" /></g>
      <g id="i-hint">
        <path d="M9 18h6" /><path d="M10 22h4" />
        <path d="M15.1 14c.2-1 .7-1.7 1.4-2.5A4.7 4.7 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.8 1.2 1.5 1.4 2.5" />
      </g>
      <g id="i-music"><path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" /></g>
      <g id="i-eye"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></g>
      <g id="i-settings">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
      </g>
    </defs>
  </svg>

  <header id="topbar" hidden>
    <button id="topbar-back" class="icon-btn" aria-label="Back" hidden>
      <svg class="icon" viewBox="0 0 24 24"><use href="#i-back" /></svg>
    </button>
    <span id="topbar-title" class="brand">SYSbuga</span>
    <button id="btn-settings" class="icon-btn" aria-label="Settings" title="Settings">
      <svg class="icon" viewBox="0 0 24 24"><use href="#i-settings" /></svg>
    </button>
  </header>

  <main id="app">
    <section id="screen-loading" class="screen center">
      <h1 id="app-name">SYSbuga</h1>
      <div class="progress"><div class="progress-fill"></div></div>
      <p id="loading-error" class="error-text" hidden></p>
    </section>

    <section id="screen-home" class="screen center">
      <h1 class="home-title">SYSbuga</h1>
      <p class="sub">Choose an activity</p>
      <div class="panel activity-list">
        <button id="btn-guessing" class="activity-item">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-music" /></svg>
          <span class="activity-name">Guessing</span>
        </button>
        <button id="btn-spectate" class="activity-item">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-eye" /></svg>
          <span class="activity-name">Spectate</span>
        </button>
      </div>
    </section>

    <section id="screen-setup" class="screen center">
      <div class="panel">
        <p class="sub">Choose a mode</p>
        <select id="mode-select"></select>
        <button id="btn-start" class="primary">Start</button>
      </div>
    </section>

    <section id="screen-round" class="screen">
      <div class="round-bar">
        <button id="btn-quit" class="icon-btn" aria-label="Back">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-back" /></svg>
        </button>
        <span id="round-mode" class="round-title"></span>
        <div id="watchers" class="watchers" aria-label="Spectators"></div>
        <button id="btn-hint" class="icon-btn" aria-label="Hint" title="Hint">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-hint" /></svg>
        </button>
      </div>
      <div class="round-body">
        <div class="round-menu">
          <span id="round-timer" class="timer" hidden></span>
          <p id="round-prompt" class="prompt"></p>
          <div class="round-image-wrap"><img id="round-image" alt="" hidden /><video id="round-video" hidden loop autoplay playsinline></video><audio id="round-audio" hidden controls></audio></div>
          <form id="guess-form">
            <input id="guess-input" type="text" autocomplete="off"
                   autocapitalize="off" placeholder="Type your guess…" maxlength="200" />
            <button type="submit" id="guess-submit">Guess</button>
          </form>
          <button id="btn-giveup" class="link-btn" hidden>Give up</button>
          <p id="round-result"></p>
          <button id="btn-again" class="primary" hidden>Play again</button>
        </div>
        <div class="log-panel panel">
          <ul id="guess-log"></ul>
        </div>
      </div>
    </section>

    <section id="screen-spectate" class="screen">
      <div class="round-bar">
        <button id="spectate-stop" class="icon-btn" aria-label="Stop watching">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-back" /></svg>
        </button>
        <span id="spectate-title" class="round-title">Watching…</span>
        <span class="spectate-tag"><svg class="icon" viewBox="0 0 24 24"><use href="#i-eye" /></svg></span>
      </div>
      <div class="round-body">
        <div class="round-menu">
          <span id="spectate-timer" class="timer" hidden></span>
          <p id="spectate-prompt" class="prompt"></p>
          <div class="round-image-wrap"><img id="spectate-image" alt="" hidden /><video id="spectate-video" hidden loop autoplay playsinline></video><audio id="spectate-audio" hidden controls></audio></div>
          <div id="spectate-typing" class="typing-line"></div>
          <p id="spectate-result"></p>
        </div>
        <div class="log-panel panel">
          <ul id="spectate-log"></ul>
        </div>
      </div>
      <div id="spectate-gone" class="spectate-gone" hidden>
        <p class="gone-text">They left the activity.</p>
        <p class="sub">You'll resume automatically if they come back.</p>
        <button id="spectate-gone-back" class="primary">Back</button>
      </div>
    </section>
  </main>

  <div id="settings-modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2>Settings</h2>
        <button id="settings-close" class="icon-btn" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-close" /></svg>
        </button>
      </div>
      <div class="setting-row">
        <span class="setting-label">Dark mode</span>
        <label class="switch">
          <input type="checkbox" id="theme-toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div id="spectate-modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2>Spectate</h2>
        <button id="spectate-close" class="icon-btn" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24"><use href="#i-close" /></svg>
        </button>
      </div>
      <p class="sub">Watch someone who's playing right now.</p>
      <ul id="spectate-list" class="spectate-list"></ul>
    </div>
  </div>

  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <p id="modal-text"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="ghost"></button>
        <button id="modal-confirm"></button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
